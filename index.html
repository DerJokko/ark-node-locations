<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>ARK Fjordur Rune Checklist</title>
    <link rel="icon" href="assets/img/228px-Runes.webp">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="element picture picture"><a href="assets/img/media-1744349184_1fd0ad4a9002321bc0b4_NOBG.png"
            target="_blank" rel="noopener noreferrer"><img
                src="assets/img/media-1744349184_1fd0ad4a9002321bc0b4_NOBG.png" alt="Section image"></a>
        <p class="image-caption">Image:
            <a href="https://blackclue.com/all-200-rune-locations-on-fjordur-ark-survival-evolved" target="_blank"
                rel="noopener noreferrer">BlackClue</a>
        </p>
    </div>

    <h1>ARK Fjordur Rune Checklist</h1>

    <button id="checkAllButton">Check All</button>
    <button id="uncheckAllButton">Uncheck All</button>
    <button id="exportButton">Export Progress</button>
    <input id="importFile" type="file" display="none" accept=".json">

    <p id="progress"></p>

    <div id="content"></div>

    <div id="exportModal" class="modal hidden" aria-hidden="true" role="dialog" aria-labelledby="exportModalTitle">
        <div class="modal-content">
            <h2 id="exportModalTitle">Export Progress</h2>
            <p>Enter a file name for your export. The <code>.json</code> extension is fixed.</p>
            <label for="exportFileName">File name</label>
            <div class="filename-input-row">
                <input id="exportFileName" type="text" maxlength="100" autocomplete="off">
                <span class="json-suffix">.json</span>
            </div>
            <div class="modal-footer">
                <button id="exportCancelButton" type="button">Cancel</button>
                <button id="exportConfirmButton" type="button">Export</button>
            </div>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>

</html>
